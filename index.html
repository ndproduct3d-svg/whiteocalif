<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>whiteocalif</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f5f5;cursor:grab}
body.drag{cursor:grabbing}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;image-rendering:auto}
.loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#f5f5f5;z-index:10;transition:opacity .4s}
.loader.hidden{opacity:0;pointer-events:none}
.lbar{width:160px;height:2px;background:rgba(0,0,0,0.08);border-radius:1px;overflow:hidden}
.lfill{height:100%;background:rgba(0,0,0,0.25);width:0%;transition:width .15s;border-radius:1px}
.ltxt{font-size:11px;color:rgba(0,0,0,0.35);font-family:system-ui,sans-serif;letter-spacing:0.06em}
.lerr{font-size:12px;color:#c00;font-family:system-ui,sans-serif;text-align:center;padding:0 24px;line-height:1.7;white-space:pre-line;display:none}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.9);font-size:12px;font-family:system-ui,sans-serif;padding:7px 18px;border-radius:20px;pointer-events:none;transition:opacity .6s;letter-spacing:0.04em;white-space:nowrap}
.hint.fade{opacity:0}
.variant-panel{position:fixed;right:18px;bottom:18px;z-index:5;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;max-width:min(420px,calc(100vw - 36px))}
.variant-btn{border:1px solid rgba(255,255,255,0.18);background:rgba(0,0,0,0.24);backdrop-filter:blur(8px);color:rgba(255,255,255,0.72);border-radius:999px;padding:8px 12px;font:12px system-ui,sans-serif;cursor:pointer;transition:all .18s}
.variant-btn:hover,.variant-btn.on{border-color:rgba(200,240,80,0.72);color:#c8f050;background:rgba(0,0,0,0.44)}
body.zoom-mode{cursor:grab}
body.zoom-mode.drag{cursor:grabbing}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="loader" id="loader">
  <div class="lbar"><div class="lfill" id="lfill"></div></div>
  <div class="ltxt" id="ltxt">Загрузка...</div>
  <div class="lerr" id="lerr"></div>
</div>
<div class="hint fade" id="hint">Перетащите для вращения · двойной клик = зум</div>

<script>
const CFG={framesPath:'frames',totalFrames:360,framePrefix:'1_0001_',frameExt:'png',frameDigits:4,transparent:false,bgColor:'#f5f5f5',sx:1.0,ease:.18,inertia:.92};
const BASE_SEQ={id:'base',path:CFG.framesPath,prefix:CFG.framePrefix,ext:CFG.frameExt,digits:CFG.frameDigits,total:CFG.totalFrames};
const VARIANTS=[];
const HIRES=null;
const cv=document.getElementById('cv'),loader=document.getElementById('loader'),lfill=document.getElementById('lfill'),ltxt=document.getElementById('ltxt'),hint=document.getElementById('hint');
const imgs=[],hiImgs=[];const hiQueue=new Set(),hiLoading=new Set();let loaded=0,shown=false,fF=0,tF=0,vX=0,drag=false,px=0,py=0,zoomMode=false,zoomScale=2.2,zX=0,zY=0,activeVariant='base';
function dpr(){return window.devicePixelRatio||1}
function resize(){
  const d=dpr(),w=window.innerWidth,h=window.innerHeight;
  cv.width=Math.round(w*d);cv.height=Math.round(h*d);
  cv.style.width=w+'px';cv.style.height=h+'px';
  draw();
}
function draw(){
  if(!shown)return;
  const n=CFG.totalFrames,f=((Math.round(fF)%n)+n)%n,img=getBestImg(f);
  preloadHiResAround(f);
  const ctx=cv.getContext('2d',{alpha:CFG.transparent}),w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  if(!CFG.transparent){ctx.fillStyle=CFG.bgColor;ctx.fillRect(0,0,w,h);}
  if(!img)return;
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  const pad=0.04,maxW=w*(1-pad*2),maxH=h*(1-pad*2),r=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight),dw=img.naturalWidth*r,dh=img.naturalHeight*r;
  const ox=(w-dw)/2,oy=(h-dh)/2;
  if(zoomMode){
    clampZoom(w,h,dw,dh);
    ctx.drawImage(img,zX,zY,dw*zoomScale,dh*zoomScale);
  }else{
    ctx.drawImage(img,ox,oy,dw,dh);
  }
}
function clampZoom(w,h,dw,dh){
  const zw=dw*zoomScale,zh=dh*zoomScale;
  zX=zw>w?Math.min(0,Math.max(w-zw,zX)):(w-zw)/2;
  zY=zh>h?Math.min(0,Math.max(h-zh,zY)):(h-zh)/2;
}
function getImg(i){const n=CFG.totalFrames;for(let d=0;d<n;d++){const a=imgs[(i+d)%n];if(a&&a.complete&&a.naturalWidth)return a;const b=imgs[(i-d+n)%n];if(b&&b.complete&&b.naturalWidth)return b}return null}
function hasHiRes(){return activeVariant==='base'&&HIRES&&HIRES.enabled}
function hiSrc(i){return HIRES.path+'/'+HIRES.prefix+String(i+1).padStart(HIRES.digits,'0')+'.'+HIRES.ext}
function getBestImg(i){const h=hiImgs[i];return hasHiRes()&&h&&h.complete&&h.naturalWidth?h:getImg(i)}
function loadHiResFrame(i){if(!hasHiRes()||i<0||i>=HIRES.total||hiImgs[i]||hiQueue.has(i)||hiLoading.has(i))return;hiQueue.add(i);pumpHiRes()}
function pumpHiRes(){if(!hasHiRes())return;while(hiLoading.size<2&&hiQueue.size){const i=hiQueue.values().next().value;hiQueue.delete(i);hiLoading.add(i);const img=new Image();img.decoding='async';img.onload=()=>{hiLoading.delete(i);hiImgs[i]=img;draw();pumpHiRes()};img.onerror=()=>{hiLoading.delete(i);pumpHiRes()};img.src=hiSrc(i)}}
function preloadHiResAround(center){if(!hasHiRes())return;const n=Math.min(CFG.totalFrames,HIRES.total);loadHiResFrame(((center%n)+n)%n);for(let d=1;d<=6;d++){loadHiResFrame((center+d)%n);loadHiResFrame((center-d+n)%n)}}
function preloadHiResAll(){if(!hasHiRes())return;const n=Math.min(CFG.totalFrames,HIRES.total);let c=((Math.round(tF)%n)+n)%n;preloadHiResAround(c);let offset=7;function step(){if(!hasHiRes())return;for(let k=0;k<12&&offset<n;k++,offset++){loadHiResFrame((c+offset)%n)}if(offset<n)setTimeout(step,120)}setTimeout(step,300)}
function loop(){requestAnimationFrame(loop);if(!shown)return;fF+=(tF-fF)*Math.min(CFG.ease*3,1);if(!drag&&Math.abs(vX)>0.05){tF+=vX;vX*=CFG.inertia}draw()}
function pad0(n){return String(n+1).padStart(CFG.frameDigits,'0')}
function reveal(){if(shown)return;shown=true;loader.classList.add('hidden');hint.classList.remove('fade');setTimeout(()=>hint.classList.add('fade'),3000);draw()}
function loadAll(){let errs=0,next=0,active=0,max=6;imgs.length=CFG.totalFrames;if(activeVariant==='base'){hiImgs.length=0;hiQueue.clear();hiLoading.clear()}function done(i,img,ok){active--;loaded++;if(ok)imgs[i]=img;else errs++;lfill.style.width=Math.round(loaded/CFG.totalFrames*100)+'%';ltxt.textContent='Загрузка '+loaded+' / '+CFG.totalFrames;if(ok&&i===0){reveal();preloadHiResAll()}if(loaded===CFG.totalFrames&&errs===CFG.totalFrames){loader.classList.remove('hidden');document.getElementById('lerr').style.display='block';document.getElementById('lerr').textContent='Кадры не найдены\n\nОжидается:\n'+CFG.framesPath+'/'+CFG.framePrefix+pad0(0)+'.'+CFG.frameExt;ltxt.style.display='none';lfill.parentElement.style.display='none'}pump()}function start(i){active++;const img=new Image();img.decoding='async';img.onload=()=>{const finish=()=>done(i,img,true);if(img.decode)img.decode().then(finish).catch(finish);else finish()};img.onerror=()=>done(i,img,false);img.src=CFG.framesPath+'/'+CFG.framePrefix+pad0(i)+'.'+CFG.frameExt}function pump(){while(active<max&&next<CFG.totalFrames)start(next++)}pump()}
function applySequence(seq){
  CFG.framesPath=seq.path;CFG.framePrefix=seq.prefix;CFG.frameExt=seq.ext;CFG.frameDigits=seq.digits;CFG.totalFrames=seq.total;
  loaded=0;shown=false;imgs.length=0;loader.classList.remove('hidden');lfill.style.width='0%';ltxt.style.display='block';ltxt.textContent='Загрузка...';
  const n=CFG.totalFrames;tF=((Math.round(tF)%n)+n)%n;fF=tF;loadAll();
}
function switchVariant(id){
  activeVariant=activeVariant===id?'base':id;
  document.querySelectorAll('.variant-btn').forEach(b=>b.classList.toggle('on',b.dataset.variant===activeVariant));
  const seq=activeVariant==='base'?BASE_SEQ:VARIANTS.find(v=>v.id===activeVariant);
  if(seq)applySequence(seq);
}
function toggleZoom(e){
  zoomMode=!zoomMode;
  document.body.classList.toggle('zoom-mode',zoomMode);
  if(zoomMode){
    const d=dpr(),w=cv.width,h=cv.height,n=CFG.totalFrames,f=((Math.round(fF)%n)+n)%n,img=getBestImg(f);
    if(img){
      const pad=0.04,maxW=w*(1-pad*2),maxH=h*(1-pad*2),r=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight),dw=img.naturalWidth*r,dh=img.naturalHeight*r;
      const ox=(w-dw)/2,oy=(h-dh)/2,cx=(e?e.clientX:window.innerWidth/2)*d,cy=(e?e.clientY:window.innerHeight/2)*d;
      const fx=Math.max(0,Math.min(1,(cx-ox)/dw)),fy=Math.max(0,Math.min(1,(cy-oy)/dh));
      zX=cx-fx*dw*zoomScale;zY=cy-fy*dh*zoomScale;clampZoom(w,h,dw,dh);
    }
  }
  draw();
}
document.addEventListener('dblclick',e=>{e.preventDefault();toggleZoom(e)});
document.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;vX=0;document.body.classList.add('drag')});
window.addEventListener('mouseup',()=>{drag=false;document.body.classList.remove('drag')});
window.addEventListener('mousemove',e=>{
  if(!drag)return;const dx=e.clientX-px,dy=e.clientY-py;px=e.clientX;py=e.clientY;
  if(zoomMode){const d=dpr();zX+=dx*d;zY+=dy*d;draw();return;}
  tF-=dx*CFG.sx;vX=-dx*CFG.sx*0.25;
});
document.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;vX=0}},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{if(!drag||!e.touches.length)return;const dx=e.touches[0].clientX-px,dy=e.touches[0].clientY-py;px=e.touches[0].clientX;py=e.touches[0].clientY;if(zoomMode){const d=dpr();zX+=dx*d;zY+=dy*d;draw();return;}tF-=dx*CFG.sx;vX=-dx*CFG.sx*0.25},{passive:true});
window.addEventListener('wheel',e=>{e.preventDefault();tF+=e.deltaY*0.06},{passive:false});
window.addEventListener('resize',resize);
resize();loop();loadAll();
</script>
</body>
</html>
